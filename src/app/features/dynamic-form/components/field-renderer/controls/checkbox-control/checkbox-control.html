<div [formGroup]="form()">
    <div class="form-check">
        <input class="form-check-input" type="checkbox" [formControlName]="field().key" />

        <label [class]="labelClass()">
            {{ fieldLabel() }}

            @if (isRequired()) {
            <span class="text-danger">*</span>
            }
        </label>
    </div>

    @if (showError()) {
    <div [class]="errorClass()">
        {{ errorMessage() }}
    </div>
    }
</div>
