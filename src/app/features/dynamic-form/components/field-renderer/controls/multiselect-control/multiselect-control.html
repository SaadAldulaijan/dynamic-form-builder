<div [formGroup]="form()">
	<label [class]="labelClass()">
		{{ fieldLabel() }}

		@if (isRequired()) {
			<span class="text-danger">*</span>
		}
	</label>

	<div>
		@for (option of options(); track option.value) {
			<div class="form-check">
				<input
					class="form-check-input"
					type="checkbox"
					[checked]="isMultiSelected(option.value)"
					[disabled]="isMultiselectOptionDisabled(option.value)"
					(change)="toggleMultiSelect(option.value, $event)"
				/>

				<label class="form-check-label">
					{{ optionLabel(option) }}
				</label>
			</div>
		}
	</div>

	<small class="text-muted">
		{{ 'COMMON.SELECTED' | translate }}:
		{{ selectedCount() }}

		@if (maxSelected()) {
			/ {{ maxSelected() }}
		}
	</small>

	@if (showError()) {
		<div [class]="errorClass()">
			{{ errorMessage() }}
		</div>
	}
</div>
