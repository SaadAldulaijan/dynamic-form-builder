<div [formGroup]="form">
  <label class="form-label">
    {{ getFieldLabel() }}

    @if (isRequired()) {
      <span class="text-danger">*</span>
    }
  </label>

<input type="text" [formControlName]="field.key" [readonly]="field.readonly"
    [class]="getControlClass('form-control')" />

  @if (getErrorMessage()) {
    <div class="text-danger small mt-1">
      {{ getErrorMessage() }}
    </div>
  }
</div>
