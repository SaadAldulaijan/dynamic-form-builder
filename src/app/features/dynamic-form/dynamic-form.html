<h2>{{ schema.title }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  @for (field of schema.fields; track field.key) {
    @if (isVisible(field)) {
      <app-field-renderer
        [field]="field"
        [form]="form">
      </app-field-renderer>
    }
  }

  <button type="submit">Submit</button>
</form>

<pre>{{ form.value | json }}</pre>
